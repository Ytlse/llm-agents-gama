x-shared-env: &shared-env
  REDIS_URL: redis://redis:6379/0
  OTP_ENDPOINTS: http://otp:8080/otp/transmodel/v3,http://otp2:8080/otp/transmodel/v3
  APP_CONFIG_PATH: /app/config/${CONFIG_FILE:-config_baseline_1000_current.yaml}

# ── EQUASIM env vars (override from .env or shell) ───────────────────────────
# EQASIM_POPULATION_SIZE: if unset, read from APP_CONFIG_PATH
# EQASIM_GENERATE_PERSONALITY: "true" to populate Big Five scores
# EQASIM_RANDOM_SEED: reproducibility seed (default 1234)
x-eqasim-env: &eqasim-env
  APP_CONFIG_PATH: /app/config/${CONFIG_FILE:-config_baseline_1000_current.yaml}
  EQASIM_POPULATION_SIZE: ${EQASIM_POPULATION_SIZE:-}
  EQASIM_GENERATE_PERSONALITY: ${EQASIM_GENERATE_PERSONALITY:-false}
  EQASIM_RANDOM_SEED: ${EQASIM_RANDOM_SEED:-1234}

services:

  # ─────────────────────────────────────────────
  # EQUASIM Toulouse — génération de la population synthétique
  #
  # Service one-shot : se termine une fois le JSON de population produit.
  # Le controller attend sa complétion via service_completed_successfully.
  #
  # Volumes requis sur l'hôte (monter les données INSEE/OSM/GTFS/BAN/BDTOPO) :
  #   ./data/eqasim/data   → données d'entrée brutes (lecture seule)
  #   ./data/eqasim/cache  → cache pipeline intermédiaire (accélère les re-runs)
  # Volume partagé avec le controller :
  #   eqasim_output        → JSON de population consommé par EqasimJSONPopulationLoader
  # ─────────────────────────────────────────────

  eqasim:
    build:
      context: ./eqasim-toulouse
      dockerfile: Dockerfile
    entrypoint: ["uv", "run", "python", "/eqasim/server.py"]
    ports:
      - "8003:8003"
    mem_limit: 10g
    environment:
      <<: *eqasim-env
      EQASIM_PROCESSES: ${EQASIM_PROCESSES:-2}
    volumes:
      - ./eqasim-toulouse/generate_population.py:/eqasim/generate_population.py:ro
      - ./eqasim-toulouse/server.py:/eqasim/server.py:ro
      - ./llm-agents/config:/app/config:ro
      - ./eqasim-toulouse/data:/eqasim-data:rw
      - ./eqasim-toulouse/data/bpe:/eqasim/data/bpe:ro
      - ./eqasim-toulouse/data/census:/eqasim/data/census:ro
      - ./eqasim-toulouse/data/spatial:/eqasim/data/spatial:ro
      - ./eqasim-toulouse/data/sirene:/eqasim/data/sirene:ro
      - ./eqasim-toulouse/synthesis:/eqasim/synthesis:ro
      - eqasim_cache:/eqasim-cache:rw
      - eqasim_output:/eqasim-output:rw
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # Infrastructure
  # 
  # - Redis est une base de données en mémoire, open source, utilisée comme cache, 
  #   broker de messages et base de données clé-valeur.
  #   Il va permettre de broker les prompts et les résultats entre l'API Gateway et les Workers LLM
  # ─────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # OpenTripPlanner — routage multimodal Toulouse
  # ─────────────────────────────────────────────

  otp:
    image: eclipse-temurin:21-jre-jammy
    ports:
      - "8080:8080"
    mem_limit: 5g
    volumes:
      - ./otp-toulouse/bin:/otp/bin:ro
      - ./otp-toulouse/toulouse:/var/otp/toulouse:ro
    command: ["sh", "-c", "java -Xmx4G -jar /otp/bin/*.jar --load /var/otp/toulouse --port 8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s  # OTP peut prendre jusqu'à 5 min pour charger le graphe

  otp2:
    image: eclipse-temurin:21-jre-jammy
    ports:
      - "8081:8080"
    mem_limit: 5g
    volumes:
      - ./otp-toulouse/bin:/otp/bin:ro
      - ./otp-toulouse/toulouse:/var/otp/toulouse:ro
    command: ["sh", "-c", "java -Xmx4G -jar /otp/bin/*.jar --load /var/otp/toulouse --port 8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s  # OTP peut prendre jusqu'à 5 min pour charger le graphe

  # ─────────────────────────────────────────────
  # LLM Agents — Architecture API Gateway + Worker Celery + Monitoring
  #
  # Description :
  #   - API Gateway (FastAPI) :
  #       Interface entre GAMA et les modèles de langage (LLM).
  #       Reçoit les requêtes de GAMA, les transforme en prompts adaptés,
  #       et envoie les tâches asynchrones au worker Celery.
  #       Retourne les résultats finaux à GAMA après traitement.
  #
  #   - Worker Celery :
  #       Exécute les tâches de génération de prompts envoyées par l'API.
  #       Interagit avec les LLM et d'autres services (OTP).
  #       Retourne les résultats à l'API via Redis.
  #
  #   - Flower (Monitoring) :
  #       Interface web pour visualiser l'état des tâches Celery,
  #       surveiller les workers, les files d'attente et les résultats.
  # ─────────────────────────────────────────────

  api:
    build:
      context: ./llm_module
      dockerfile: Dockerfile
    command: uvicorn llm_module.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./.env
    environment:
      <<: *shared-env
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      #APP_WORKDIR: /app/workdir
      GAMA_WS_URL: ws://host.docker.internal:3001
    volumes:
      - ./llm_module:/app/llm_module
      - ./data/gtfs:/data/gtfs
      - ./experiments:/app/experiments
    depends_on:
      redis:
        condition: service_healthy
      otp:
        condition: service_healthy
      otp2:
        condition: service_healthy

  controller:
    build:
      context: ./llm-agents
      dockerfile: Dockerfile
    command: sh -c "python /app/archive_log.py && hypercorn handle.application:app --bind 0.0.0.0:8002"
    ports:
      - "8002:8002"
    env_file: ./.env
    environment:
      <<: *shared-env
      LLM_API_URL: http://api:8000
      EQASIM_SERVICE_URL: http://eqasim:8003
      #APP_WORKDIR: /app/workdir
      GAMA_WS_URL: ws://host.docker.internal:3001
      PYTHONPATH: /app:/opt
    volumes:
      - ./llm-agents:/app
      - ./llm_module:/opt/llm_module
      - ./data/gtfs:/data/gtfs
      - ./experiments:/app/experiments
      - eqasim_output:/data/eqasim-output:ro
    depends_on:
      api:
        condition: service_started
      otp:
        condition: service_healthy
      otp2:
        condition: service_healthy
      eqasim:
        condition: service_healthy

  worker:
    build:
      context: ./llm_module
      dockerfile: Dockerfile
    command: celery -A llm_module.worker.task_worker.celery_app worker --loglevel=info --concurrency=8
    env_file: ./.env
    environment:
      <<: *shared-env
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_WORKDIR: /app/experiments/current
    volumes:
      - ./llm_module:/app/llm_module
      - ./otp-toulouse/toulouse/gtfs:/data/gtfs
      - ./experiments:/app/experiments
    depends_on:
      redis:
        condition: service_healthy
      otp:
        condition: service_healthy
      otp2:
        condition: service_healthy


  flower:
    build:
      context: ./llm_module
      dockerfile: Dockerfile
    command: celery -A llm_module.worker.task_worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: ./.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

  # ─────────────────────────────────────────────
  # Monitoring: Prometheus & Grafana
  # ─────────────────────────────────────────────

  node_exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # ─────────────────────────────────────────────
  # GAMA Server — simulation multi-agents
  # TODO: à configurer quand le Dockerfile GAMA sera prêt
