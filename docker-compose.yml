x-shared-env: &shared-env
  REDIS_URL: redis://redis:6379/0
  OTP_ENDPOINT: http://otp:8080/otp/transmodel/v3
  APP_CONFIG_PATH: /app/config/${CONFIG_FILE:-config_baseline_1000_current.yaml}

services:

  # ─────────────────────────────────────────────
  # Infrastructure
  # 
  # - Redis est une base de données en mémoire, open source, utilisée comme cache, 
  #   broker de messages et base de données clé-valeur.
  #   Il va permettre de broker les prompts et les résultats entre l'API Gateway et les Workers LLM
  # ─────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─────────────────────────────────────────────
  # OpenTripPlanner — routage multimodal Toulouse
  # ─────────────────────────────────────────────

  otp:
    build:
      context: ./otp-toulouse
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    mem_limit: 5g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s  # OTP met du temps à charger le graph

  # ─────────────────────────────────────────────
  # LLM Agents — Architecture API Gateway + Worker Celery + Monitoring
  #
  # Description :
  #   - API Gateway (FastAPI) :
  #       Interface entre GAMA et les modèles de langage (LLM).
  #       Reçoit les requêtes de GAMA, les transforme en prompts adaptés,
  #       et envoie les tâches asynchrones au worker Celery.
  #       Retourne les résultats finaux à GAMA après traitement.
  #
  #   - Worker Celery :
  #       Exécute les tâches de génération de prompts envoyées par l'API.
  #       Interagit avec les LLM (via vllm, llama-index, etc.) et d'autres services (OTP).
  #       Retourne les résultats à l'API via Redis.
  #
  #   - Flower (Monitoring) :
  #       Interface web pour visualiser l'état des tâches Celery,
  #       surveiller les workers, les files d'attente et les résultats.
  # ─────────────────────────────────────────────

  api:
    build:
      context: ./llm_module
      dockerfile: Dockerfile
    command: uvicorn llm_module.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./.env
    environment:
      <<: *shared-env
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      #APP_WORKDIR: /app/workdir
      GAMA_WS_URL: ws://host.docker.internal:3001
    volumes:
      - ./llm_module:/app/llm_module
      - ./data/gtfs:/data/gtfs
      - ./data/po_toulouse.big:/data/po_toulouse.big
      - ./experiments:/experiments
    depends_on:
      redis:
        condition: service_healthy
      otp:
        condition: service_healthy

  controller:
    build:
      context: ./llm-agents
      dockerfile: Dockerfile
    command: sh -c "python /app/archive_log.py && hypercorn handle.application:app --bind 0.0.0.0:8002"
    ports:
      - "8002:8002"
    env_file: ./.env
    environment:
      <<: *shared-env
      LLM_API_URL: http://api:8000
      #APP_WORKDIR: /app/workdir
      GAMA_WS_URL: ws://host.docker.internal:3001
    volumes:
      - ./llm-agents:/app
      - ./llm_module:/app/llm_module
      - ./data/gtfs:/data/gtfs
      - ./data/po_toulouse.big:/data/po_toulouse.big
      - ./experiments:/experiments
    depends_on:
      api:
        condition: service_started
      otp:
        condition: service_healthy

  worker:
    build:
      context: ./llm_module
      dockerfile: Dockerfile
    command: celery -A llm_module.worker.task_worker.celery_app worker --loglevel=info --concurrency=4
    env_file: ./.env
    environment:
      <<: *shared-env
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./llm_module:/app/llm_module
      - ./otp-toulouse/toulouse/gtfs:/data/gtfs
      - ./experiments:/experiments
    depends_on:
      redis:
        condition: service_healthy
      otp:
        condition: service_healthy


  flower:
    build:
      context: ./llm_module
      dockerfile: Dockerfile
    command: celery -A llm_module.worker.task_worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: ./.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - worker

  # ─────────────────────────────────────────────
  # Monitoring: Prometheus & Grafana
  # ─────────────────────────────────────────────

  node_exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./data/grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

