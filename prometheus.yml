global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'llm_agents_api'
    static_configs:
      - targets: ['api:8000']

  - job_name: 'llm_agents_controller'
    static_configs:
      - targets: ['controller:8002']

  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']